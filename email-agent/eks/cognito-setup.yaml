AWSTemplateFormatVersion: '2010-09-09'
Description: Cognito User Pool for Email AgentPulse (emailaipulse.opssightai.com)

Parameters:
  ApplicationName:
    Type: String
    Default: email-agentpulse
    Description: Application name used for resource naming

  DomainName:
    Type: String
    Default: emailaipulse.opssightai.com
    Description: Application domain for OAuth callback URLs

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub '${ApplicationName}-user-pool'
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: name
          AttributeDataType: String
          Required: false
          Mutable: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub '${ApplicationName}-${AWS::AccountId}'
      UserPoolId: !Ref UserPool

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub '${ApplicationName}-alb-client'
      UserPoolId: !Ref UserPool
      GenerateSecret: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - !Sub 'https://${DomainName}/oauth2/idpresponse'
      LogoutURLs:
        - !Sub 'https://${DomainName}'
      SupportedIdentityProviders:
        - COGNITO
      PreventUserExistenceErrors: ENABLED

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Admins
      UserPoolId: !Ref UserPool
      Description: Administrators with full access
      Precedence: 0

  ViewerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Viewers
      UserPoolId: !Ref UserPool
      Description: Read-only users
      Precedence: 10

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
    Export:
      Name: !Sub '${ApplicationName}-UserPoolId'

  UserPoolArn:
    Description: Cognito User Pool ARN
    Value: !GetAtt UserPool.Arn
    Export:
      Name: !Sub '${ApplicationName}-UserPoolArn'

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub '${ApplicationName}-UserPoolClientId'

  UserPoolDomainUrl:
    Description: Cognito Hosted UI Domain
    Value: !Sub '${ApplicationName}-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com'

  CognitoLoginURL:
    Description: Cognito Hosted UI Login URL
    Value: !Sub 'https://${ApplicationName}-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/login?client_id=${UserPoolClient}&response_type=code&redirect_uri=https://${DomainName}/oauth2/idpresponse'
