apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: email-agent-alb
  namespace: email-agent
  annotations:
    # ALB Configuration
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'

    # Cognito Authentication
    alb.ingress.kubernetes.io/auth-type: cognito
    alb.ingress.kubernetes.io/auth-idp-cognito: '{"userPoolArn":"REPLACE_WITH_USER_POOL_ARN","userPoolClientId":"REPLACE_WITH_CLIENT_ID","userPoolDomain":"REPLACE_WITH_COGNITO_DOMAIN"}'
    alb.ingress.kubernetes.io/auth-on-unauthenticated-request: authenticate
    alb.ingress.kubernetes.io/auth-scope: 'email openid profile'
    alb.ingress.kubernetes.io/auth-session-cookie: AWSELBAuthSessionCookie
    alb.ingress.kubernetes.io/auth-session-timeout: '3600'

    # SSL Certificate (ACM)
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:713220200108:certificate/9ebb58d2-5627-4766-b540-c3049b91f8da

    # Health Check
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '30'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'

    # Tags
    alb.ingress.kubernetes.io/tags: Environment=production,Application=email-agentpulse
spec:
  ingressClassName: alb
  rules:
  - host: emailaipulse.opssightai.com
    http:
      paths:
      # API routes → backend
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: email-agent-backend
            port:
              number: 8000
      # Health check → backend
      - path: /health
        pathType: Exact
        backend:
          service:
            name: email-agent-backend
            port:
              number: 8000
      # Everything else → frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: email-agent-frontend
            port:
              number: 80
