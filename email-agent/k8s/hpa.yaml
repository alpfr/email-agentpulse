apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: email-agent-backend-hpa
  namespace: email-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: email-agent-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: email-agent-frontend-hpa
  namespace: email-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: email-agent-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
