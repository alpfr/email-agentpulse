apiVersion: v1
kind: Secret
metadata:
  name: email-agent-secrets
  namespace: email-agent
type: Opaque
stringData:
  # LLM API Keys (replace with real values before applying)
  ANTHROPIC_API_KEY: "REPLACE_WITH_REAL_KEY"
  OPENAI_API_KEY: "REPLACE_WITH_REAL_KEY"

  # Google OAuth (for Gmail API access)
  GOOGLE_CLIENT_ID: "REPLACE_WITH_REAL_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "REPLACE_WITH_REAL_CLIENT_SECRET"
  GOOGLE_REDIRECT_URI: "https://emailaipulse.opssightai.com/api/v1/gmail/oauth/callback"

  # AWS Cognito
  COGNITO_USER_POOL_ID: "REPLACE_WITH_POOL_ID"
  COGNITO_CLIENT_ID: "REPLACE_WITH_CLIENT_ID"
