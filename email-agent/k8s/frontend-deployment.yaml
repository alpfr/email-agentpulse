apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-agentpulse-frontend
  namespace: email-agent
  labels:
    app: email-agentpulse
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: email-agentpulse
      component: frontend
  template:
    metadata:
      labels:
        app: email-agentpulse
        component: frontend
    spec:
      containers:
      - name: frontend
        image: 713220200108.dkr.ecr.us-east-1.amazonaws.com/email-agentpulse-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: email-agentpulse-frontend
  namespace: email-agent
  labels:
    app: email-agentpulse
    component: frontend
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: email-agentpulse
    component: frontend
